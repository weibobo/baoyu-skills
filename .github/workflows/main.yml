# 工作流名称
name: Sync Upstream Repository

# 触发条件：
# 1. 定时触发：每天凌晨 2 点（UTC 时间，对应北京时间 10 点）
# 2. 手动触发：可在 Actions 页面点击「Run workflow」手动执行
on:
  schedule:
    - cron: '0 2 * * *'  # 定时规则：分 时 日 月 周，UTC 时间
  workflow_dispatch:  # 允许手动触发

# 权限配置：需要写入仓库的权限
permissions:
  contents: write

# 执行的任务
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Upstream
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.1
        with:
          upstream_sync_repo: JimLiu/baoyu-skills
          upstream_sync_branch: main
          target_sync_branch: main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
