# 工作流名称
name: Sync Upstream Repository

# 触发条件：
# 1. 定时触发：每天凌晨 2 点（UTC 时间，对应北京时间 10 点）
# 2. 手动触发：可在 Actions 页面点击「Run workflow」手动执行
on:
  schedule:
    - cron: '0 2 * * *'  # 定时规则：分 时 日 月 周，UTC 时间
  workflow_dispatch:  # 允许手动触发

# 权限配置：需要写入仓库的权限
permissions:
  contents: write

# 执行的任务
jobs:
  sync:
    runs-on: ubuntu-latest  # 使用 Ubuntu 虚拟机运行
    steps:
      # 步骤 1：检出你的 Fork 仓库代码
      - name: Checkout Fork Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整的提交历史，避免合并冲突

      # 步骤 2：添加上游仓库地址并拉取更新
      - name: Add Upstream Remote and Fetch
        run: |
          # 替换下面的「原作者用户名」和「原仓库名」为实际值
          git remote add upstream https://github.com/JimLiu/baoyu-skills.git
          git fetch upstream  # 拉取上游仓库的所有分支

      # 步骤 3：合并上游主分支到你的 Fork 主分支（若有冲突会自动失败，需手动处理）
      - name: Merge Upstream to Fork
        run: |
          git checkout main  # 切换到你的 Fork 主分支（若原仓库是 master，改为 master）
          git merge upstream/main --no-edit  # 合并上游主分支，无需手动编辑提交信息

      # 步骤 4：推送合并后的代码到你的 Fork 仓库
      - name: Push to Fork Repository
        run: |
          git push origin main  # 推送至你的 Fork 主分支
